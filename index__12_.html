<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Битва Средиземья</title>
<link rel="stylesheet" href="style.css?v=777">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <div class="nav-menu">
    <button class="nav-tab active" onclick="switchTab(this, 'tab-battle')">⚔️ Бой</button>
    <button class="nav-tab" onclick="switchTab(this, 'tab-hero')">👤 Герой</button>
    <button class="nav-tab" onclick="switchTab(this, 'tab-bag')">🎒 Сумка</button>
    <button class="nav-tab" onclick="switchTab(this, 'tab-arenas')">🏟️ Арены</button>
    <button class="nav-tab" onclick="switchTab(this, 'tab-shop')">🏪 Магазин</button>
    <button class="nav-tab" onclick="switchTab(this, 'tab-leaderboard')">🏆 Топ</button>
    <button class="nav-tab" onclick="switchTab(this, 'tab-dungeons')">🌀 Подземелья</button>
    <button class="nav-tab" onclick="switchTab(this, 'tab-premium')">💠 Лунный</button>
    <button class="nav-tab" onclick="switchTab(this, 'tab-settings')">⚙️ Настройки</button>
  </div>

  <div id="tab-battle" class="tab-content active">
    <div id="main-screen">
      <div class="profile-header" id="menu-profile"></div>
      
      <div id="menu-arena-display" class="class-card" style="padding: 30px 15px; margin-bottom: 20px; border-width: 3px;">
         </div>

      <h3 style="text-align:left; font-size: 14px; margin-bottom:10px; color:#94a3b8;">Ваш герой:</h3>
      <div id="menu-class-display" class="class-card" style="display:flex; justify-content:space-between; align-items:center;" onclick="openClassModal()">
         </div>
      <div id="menu-daily-gift" style="margin-top: 15px;"></div>
    </div>

      
    <div id="battle-screen" style="display:none;">
      <div class="arena" id="battle-arena">
        <div class="character" id="player-card" onclick="openCharModal(true)" style="cursor:pointer;">
          <h2 class="char-name" id="ui-player-name">Вы</h2>
          <div id="ui-player-sub" style="font-size:11px; min-height:16px; margin-bottom:3px;"></div>
          <div class="rank-badge" id="ui-player-rank">0 LP</div>
          <div class="bar-container"><div class="bar-text" id="ui-player-hp-text">20/20</div><div class="hp-fill" id="ui-player-hp-fill"></div></div>
          <div class="skills-panel" id="ui-player-skills"></div>
        </div>
        <div class="character" id="bot-card" onclick="openCharModal(false)" style="cursor:pointer;">
          <h2 class="char-name" id="ui-bot-name">Орк</h2>
          <div id="ui-bot-sub" style="font-size:11px; min-height:16px; margin-bottom:3px;"></div>
          <div class="rank-badge" id="ui-bot-rank">0 LP</div>
          <div class="bar-container"><div class="bar-text" id="ui-bot-hp-text">20/20</div><div class="hp-fill" id="ui-bot-hp-fill"></div></div>
          <div class="skills-panel" id="ui-bot-skills"></div>
        </div>
      </div>
      
      <div class="controls" id="controls">
        <button class="action-btn btn-attack" id="btn-attack" onclick="registerAction('attack')">🗡️ Атака</button>
        <button class="action-btn btn-defend" id="btn-defend" onclick="registerAction('defend')">🛡️ Защита</button>
        <button class="action-btn btn-skill" id="btn-skill" onclick="registerAction('skill')">✨ Навык!</button>
        
        <button class="action-btn" id="btn-immortal" style="background: linear-gradient(135deg, #4c1d95, #000000); display: none; width: 100%; box-shadow: 0 0 15px rgba(124, 58, 237, 0.6);" onclick="registerAction('immortal')">💀 Возмездие</button>
        
        <button class="action-btn btn-return" id="btn-return" onclick="returnToMenu()">В меню</button>
      </div>

      <div id="turn-timer-container">
        ⏳ Ход через: <span id="turn-timer-text">4.0</span> сек.
      </div>

      <div id="combat-log"></div>
    </div>
  </div>

  <div id="tab-hero" class="tab-content">
    <h2>Экипировка</h2>
    <div class="stats-panel" id="hero-stats">ХП: 20</div>
    <div class="equip-grid">
      <div class="equip-slot" id="eq-head" onclick="openItemModal('head', true)">🪖<br>Голова</div>
      <div class="equip-slot" id="eq-body" onclick="openItemModal('body', true)">👕<br>Тело</div>
      <div class="equip-slot" id="eq-arms" onclick="openItemModal('arms', true)">🧤<br>Руки</div>
      <div class="equip-slot" id="eq-legs" onclick="openItemModal('legs', true)">👢<br>Ноги</div>
    </div>
    <div id="hero-title-btn" style="margin-top:14px;"></div>
  </div>

  <div id="tab-bag" class="tab-content">
    <h2>Сумка (<span id="bag-count">0</span>/<span id="bag-max">6</span>)</h2>
    <div class="imperial-count">Империалы: <span id="imperial-amount" style="color:#fbbf24">0</span> 🪙</div>
    <div class="inventory-grid" id="inventory-grid"></div>
    <div id="pouch-section"></div>
  </div>

  <div id="tab-arenas" class="tab-content"></div>

  <div id="tab-shop" class="tab-content">
    <h2>Торговый квартал</h2>
    <div class="imperial-count">Ваш баланс: <span id="shop-imperial-amount" style="color:#fbbf24">0</span> 🪙</div>
    <div id="shop-content"></div>
  </div>

  <div id="tab-dungeons" class="tab-content"></div>

  <div id="tab-premium" class="tab-content"></div>
  <div id="tab-settings" class="tab-content"></div>

  <div id="tab-leaderboard" class="tab-content">
    <h2>Глобальный Топ 10</h2>
    <div id="leaderboard-content" style="margin-top: 15px;"></div>
  </div>

  <div id="item-modal" class="modal">
    <div class="modal-content">
      <h3 id="modal-title">Название</h3>
      <div id="modal-desc" class="modal-desc">Описание</div>
      <div class="modal-actions" id="modal-actions"></div>
      <button class="action-btn" style="background:#475569; padding: 10px; margin-top: 10px; width: 100%;" onclick="closeModal()">Закрыть</button>
    </div>
  </div>

  <div id="class-modal" class="modal">
    <div class="modal-content">
      <h3 class="text-skill">Смена героя</h3>
      <div class="modal-desc" style="max-height: 60vh; overflow-y: auto; background: transparent; padding: 0;" id="class-modal-list">
      </div>
      <button class="action-btn" style="background:#475569; padding: 10px; margin-top: 10px; width: 100%;" onclick="closeClassModal()">Закрыть</button>
    </div>
  </div>

  <script src="dungeons.js?v=777"></script>
  <script src="script.js?v=777"></script>
</body>
</html>
